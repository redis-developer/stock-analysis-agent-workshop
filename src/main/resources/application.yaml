spring:
  application:
    name: stock-analysis-agent
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:${SPRING_AI_OPENAI_API_KEY:}}
      chat:
        options:
          model: gpt-4o
    model:
      chat: openai
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none

stock-analysis:
  market-data:
    provider: alpha-vantage
    alpha-vantage:
      base-url: https://www.alphavantage.co
      api-key: ${ALPHA_VANTAGE_API_KEY:}

app:
  cli:
    enabled: true
