spring:
  application:
    name: stock-analysis-agent
  web:
    resources:
      cache:
        cachecontrol:
          no-store: true
          no-cache: true
          must-revalidate: true
  cache:
    type: ${SPRING_CACHE_TYPE:redis}
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:./.env[.properties]
      - optional:file:../application-local.properties
      - optional:file:./application-local.properties
      - optional:file:../application-local.yaml
      - optional:file:./application-local.yaml
      - optional:file:../application-local.yml
      - optional:file:./application-local.yml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6378}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:${SPRING_AI_OPENAI_API_KEY:}}
      chat:
        options:
          model: gpt-4o
      embedding:
        options:
          model: text-embedding-3-small
    model:
      chat: openai
      embedding: openai
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    chat:
      client:
        observations:
          log-prompt: true
          log-completion: true
      observations:
        log-prompt: true
        log-completion: true
    tools:
      observations:
        include-content: true

management:
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: "*"

stock-analysis:
  market-data:
    provider: twelve-data
    twelve-data:
      base-url: https://api.twelvedata.com
      api-key: ${TWELVE_DATA_API_KEY:}
  fundamentals:
    provider: sec
  news:
    provider: sec
    tavily:
      base-url: https://api.tavily.com
      api-key: ${TAVILY_API_KEY:}
      max-results: 5
  technical-analysis:
    provider: twelve-data
    interval: 1day
    output-size: 60
    sma-period: 20
    ema-period: 20
    rsi-period: 14
  sec:
    data-base-url: https://data.sec.gov
    ticker-file-url: https://www.sec.gov/files/company_tickers.json
    user-agent: ${SEC_USER_AGENT:stock-analysis-agent-workshop workshop@example.com}
  semantic-cache:
    enabled: ${SEMANTIC_CACHE_ENABLED:true}
    distance-threshold: 0.2
    ttl-seconds: 300
    name: stock-analysis-semantic-cache
    embedding-model-name: ${spring.ai.openai.embedding.options.model:text-embedding-3-small}
    embedding-dimensions: 1536
  semantic-guardrail:
    enabled: ${SEMANTIC_GUARDRAIL_ENABLED:true}
    distance-threshold: 0.5
    name: stock-analysis-semantic-guardrail
    embedding-model-name: ${spring.ai.openai.embedding.options.model:text-embedding-3-small}
    embedding-dimensions: 1536

agent-memory:
  server:
    url: ${AGENT_MEMORY_SERVER_URL:http://localhost:8000}
    namespace: ${AGENT_MEMORY_NAMESPACE:stock-analysis}
  working-memory:
    strategy: custom
    custom-prompt: |
      Extract durable user memories from this conversation.

      Only extract memories that are explicitly stated by the user or clearly and explicitly confirmed by the user.
      Never infer profile facts, investing preferences, constraints, ownership, or watchlist status.
      Do not extract generic market facts, company facts, price data, agent analysis, temporary chatter, or assistant-only statements.

      Create one memory per fact.

      Allowed memory types to extract:
      - Explicit user profile facts such as name, location, job, or background
      - Stocks the user asks about, even after one mention
      - Stocks the user explicitly says they hold or own
      - Stocks the user explicitly says are on their watchlist
      - Stocks the user explicitly says they sold or no longer hold
      - Explicit, durable investing preferences
      - Explicit, durable investing constraints or rules

      Important rules:
      - If the user both asks about and owns the same stock, create both memories.
      - For stock memories, use the ticker only in the text and uppercase it.
      - For user profile, investing preference, and constraint memories, keep the wording short and factual.
      - If a fact is not explicit, do not store it.
      - Every memory text must start with the current calendar date in ISO format YYYY-MM-DD, derived from {current_datetime}.

      Return a JSON object with a top-level "memories" array.
      Each memory in the array must include:
      - type: use "semantic"
      - text
      - topics
      - entities

      Text patterns:
      - "2026-03-31 | User profile: User lives in Milan."
      - "2026-03-31 | User profile: User works in finance."
      - "2026-03-31 | Asked about stock: DUOL"
      - "2026-03-31 | Holds stock: AAPL"
      - "2026-03-31 | Watchlist stock: NVDA"
      - "2026-03-31 | Sold stock: TSLA"
      - "2026-03-31 | Investing preference: User prefers long-term investing."
      - "2026-03-31 | Constraint: User does not trade options."

      Example output:
      {
        "memories": [
          {
            "type": "semantic",
            "text": "2026-03-31 | Asked about stock: DUOL",
            "topics": ["stocks", "interest"],
            "entities": ["DUOL"]
          },
          {
            "type": "semantic",
            "text": "2026-03-31 | Holds stock: AAPL",
            "topics": ["portfolio", "stocks"],
            "entities": ["AAPL"]
          }
        ]
      }

      If there are no valid memories, return:
      {
        "memories": []
      }

      Current datetime: {current_datetime}
      Conversation: {message}

app:
  chat:
    user-id: ${CHAT_USER_ID:workshop-user}
